<!DOCTYPE html>
<html>
<head>
  <title>Crime Management System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Crime Management System</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#login">Login</a>
    <a href="#complaint">Complaint</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Track and Manage Crime Reports</h2>
  <p>A simple web portal for police, admin and citizens.</p>
  <button onclick="location.href='#login'">Get Started</button>
</section>

<section id="login" class="card">
  <h2>Login</h2>
  <input type="text" placeholder="Username">
  <input type="password" placeholder="Password">
  <button>Login</button>
</section>

<section id="complaint" class="card">
  <h2>Register Complaint</h2>
  <input type="text" placeholder="Your Name">
  <input type="text" placeholder="Crime Type">
  <textarea placeholder="Complaint Details"></textarea>
  <button>Submit</button>
</section>

<section id="contact" class="footer">
  <p>© 2026 Crime Management System</p>
</section>

</body>
</html>
